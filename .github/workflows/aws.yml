name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "VITE_SERVER_URI=${{ secrets.VITE_SERVER_URI }}" >> .env
          echo "VITE_GOOGLE_ID=${{ secrets.VITE_GOOGLE_ID }}" >> .env

      - name: Build project
        run: npm run build

      # ✅ Upload full dist (let scp do its thing)
      - name: Upload build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist"
          target: "/home/ubuntu/www"

      # ✅ Fix structure + clean in ONE step
      - name: Fix structure & reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Deploying..."

            # remove old frontend content
            rm -rf /home/ubuntu/www/frontend/*

            # move ONLY contents from dist → frontend
            cp -r /home/ubuntu/www/dist/* /home/ubuntu/www/frontend/

            # cleanup dist folder
            rm -rf /home/ubuntu/www/dist

            # reload nginx
            sudo nginx -t
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"
