name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "VITE_SERVER_URI=${{ secrets.VITE_SERVER_URI }}" >> .env
          echo "VITE_GOOGLE_ID=${{ secrets.VITE_GOOGLE_ID }}" >> .env

      - name: Build project
        run: npm run build

      # ✅ Clean target directory (no sudo needed)
      - name: Clean frontend directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🧹 Cleaning old build..."
            rm -rf /home/ubuntu/www/frontend/*

      # ✅ Upload ONLY contents of dist
      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/home/ubuntu/www/frontend"

      # ✅ Reload nginx
      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🔄 Reloading Nginx..."
            sudo nginx -t
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"
